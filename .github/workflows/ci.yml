name: Build & Package (Win/macOS/Linux)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-matrix:
    name: Build & Package
    runs-on: ${{ matrix.os }}
    strategy:
      # 关闭快速失败：单平台失败不取消其它平台，便于一次拿到三平台完整结果
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      # Tauri 在 Linux 需要 GTK/WebKit/AppIndicator 等系统库，否则 gobject/glib 编译失败
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            patchelf \
            build-essential

      - name: Install frontend dependencies
        run: npm install

      - name: Typecheck frontend
        run: npx tsc --noEmit -p tsconfig.json

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Cargo check (backend)
        run: |
          cd src-tauri
          cargo check --all-targets

      - name: Build Tauri app
        run: |
          npm run tauri build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}-bundle
          path: |
            src-tauri/target/release/bundle/
            src-tauri/target/release/voice_translator*
            src-tauri/target/release/*.dmg
            src-tauri/target/release/*.AppImage
            src-tauri/target/release/*.msi
            src-tauri/target/release/*.exe
            src-tauri/target/release/*.deb
            src-tauri/target/release/*.rpm
            src-tauri/target/release/*.zip
            src-tauri/target/release/*.tar.gz
